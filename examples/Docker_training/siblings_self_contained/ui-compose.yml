# =============================================================================
# Bind-mount-free UI stack (Envoy + Weights Studio frontend), run on the HOST
# daemon by the trainer container's entrypoint. The whole point: NO host bind
# mounts, so the host daemon needs nothing from any host path.
#   - Envoy reads its config from the `wl_envoy_cfg` named volume, which the
#     entrypoint populates over the docker socket (see entrypoint.sh).
#   - the frontend runs in HTTP mode and needs no certs mount.
# This reuses the exact same images as `weightslab ui launch`.
# =============================================================================
services:
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: weights_studio_envoy
    # Config comes from the named volume (already port-substituted by the
    # entrypoint), so just point Envoy at it — no in-container templating.
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml"]
    volumes:
      - wl_envoy_cfg:/etc/envoy:ro
    extra_hosts:
      # Envoy is a sibling on the host; it dials the trainer's gRPC backend via
      # the host (host-gateway → host:50051, which the trainer publishes).
      - "grpc-backend:host-gateway"
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"   # gRPC-web (browser -> backend)
    networks:
      - weights_studio_network
    restart: unless-stopped

  frontend:
    image: graybx/weightslab:latest
    container_name: weights_studio_frontend
    # The image's nginx entrypoint serves HTTPS when certs are present in
    # /etc/nginx/certs, else HTTP. The trainer entrypoint populates the
    # wl_nginx_certs volume only in TLS mode (empty otherwise -> HTTP), and sets
    # WS_SERVER_PROTOCOL accordingly.
    environment:
      - WS_SERVER_PROTOCOL=${WS_SERVER_PROTOCOL:-http}
      - WL_ENABLE_GRPC_AUTH_TOKEN=0
      - GRPC_AUTH_TOKEN=
    volumes:
      - wl_nginx_certs:/etc/nginx/certs:ro
    ports:
      - "5173:443"    # frontend -> http(s)://localhost:5173
    depends_on:
      - envoy
    networks:
      - weights_studio_network
    restart: unless-stopped

networks:
  weights_studio_network:
    driver: bridge

volumes:
  # Created + populated by the trainer entrypoint over the docker socket.
  wl_envoy_cfg:
    external: true
  # Frontend HTTPS certs — populated only in TLS mode (empty -> HTTP).
  wl_nginx_certs:
    external: true
