# Global configuration
device: auto
experiment_name: detection_pennfudan_usecase
training_steps_to_do: null  # null = infinite training until manually stopped (behavior set by the user in main script)
# root_log_dir:  # Empty to write in tmp directory, or specify a path to store logs and checkpoints

checkpoint_manager:
  load_config: false  # Disable loading previous checkpoint configuration to allow for changes in the current config.yaml file between experiments. Otherwise changes will be replaced.

# Initially compute natural sorting values, e.g., average intensity. More details in the README.md file.
compute_natural_sort: true

# Experiment parameters
eval_full_to_train_steps_ratio: 5
experiment_dump_to_train_steps_ratio: 5
tqdm_display: true
is_training: false  # Start training immediately or not

# Serving
serving_grpc: true
serving_cli: true

# Configure global dataframe storage
ledger_enable_h5_persistence: true
ledger_enable_flushing_threads: true
ledger_flush_max_rows: 100
ledger_flush_interval: 60.0

# Model / task
num_classes: 1            # Penn-Fudan: single class (person)
image_size: 256
grid_size: 8              # detector predicts on an 8x8 cell grid
conf_thresh: 0.3          # objectness*class confidence threshold for displayed predictions
pretrained_backbone: true # ImageNet-pretrained MobileNetV3-Small feature extractor
freeze_backbone: true     # train only the detection head (faster, less data hungry)

optimizer:
  lr: 0.001

# Data (Penn-Fudan pedestrians; ~170 images downloaded on first run under data_root)
data_root: .\data
data:
  train_loader:
    batch_size: 8
    shuffle: true
    max_samples: null     # null = use the full training split
  test_loader:
    batch_size: 8
    shuffle: false
    max_samples: null
