# Global configuration
experiment_name: ads_ctr_wide_deep
device: auto
training_steps_to_do: null  # null = train until manually stopped from the UI
# root_log_dir: ...

compute_natural_sort: false

# Experiment parameters
eval_full_to_train_steps_ratio: 100
experiment_dump_to_train_steps_ratio: 250
write_export_ratio: 100
skip_checkpoint_load: false
tqdm_display: true
is_training: false  # Start paused; press play in the UI.

# Global dataframe storage
ledger_enable_flushing_threads: true
ledger_enable_h5_persistence: true
ledger_flush_max_rows: 15000
ledger_flush_interval: 30.0

# Clients
serving_grpc: true

# Model (Wide & Deep)
model:
  emb_dim: 8
  hidden: 128

# Optimizer
optimizer:
  lr: 0.005

# Class weighting to counter ~20% click prevalence [no-click, click].
class_weights: [1.0, 4.0]

# Synthetic dataset generation (reproducible, no download).
dataset:
  seed: 0
  n_train: 8000
  n_test: 2000

# DataLoader parameters
data:
  train_loader:
    shuffle: true
    batch_size: 64
  test_loader:
    shuffle: false
    batch_size: 256
    drop_last: false
