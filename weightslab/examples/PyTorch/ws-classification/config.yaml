# Global configuration
experiment_name: mnist_classification
device: auto
training_steps_to_do: null  # Set to null for infinite training until manually stopped - behavior set by the user in main script
# root_log_dir: ...  # Path to save current experiment checkpoints and data

# Initially compute natural sorting values, e.g., average intensity. More details in the README.md file.
compute_natural_sort: false

# Experiment parameters
eval_full_to_train_steps_ratio: 500   # was 100 — full 10k eval was the dominant wall-clock cost
experiment_dump_to_train_steps_ratio: 250  # was 25 — frequent checkpoint dumps stalled training
skip_checkpoint_load: false  # If true restart the experiment from last state
tqdm_display: true  # Whether to use tqdm progress bars during training/evaluation
is_training: false  # Start training immediately or not

# Configure global dataframe storage
ledger_enable_flushing_threads: true
ledger_enable_h5_persistence: true
ledger_flush_max_rows: 15000
ledger_flush_interval: 30.0

# Configure clients
serving_grpc: true
serving_cli: false

# DataLoader parameters
# data_root: .\data  # Auto downloaded from mnist server
data:
  train_loader:
    shuffle: true
    batch_size: 16
  val_loader:
    shuffle: false
    batch_size: 16
  test_loader:
    shuffle: false
    batch_size: 128   # was 16 — bigger eval batches => ~8x fewer eval steps per pass
    drop_last: false
