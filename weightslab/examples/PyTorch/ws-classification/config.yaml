# Global configuration
device: auto
experiment_name: cls_MNIST_usecase
training_steps_to_do: null  # Set to null for infinite training until manually stopped

# Initially compute natural sorting values, e.g., average intensity. More details in the README.md file.
compute_natural_sort: false

# Experiment parameters
eval_full_to_train_steps_ratio: 5
experiment_dump_to_train_steps_ratio: 5
skip_checkpoint_load: true
tqdm_display: true
is_training: false  # Start training immediately or not

# Configure global dataframe storage
ledger_enable_flushing_threads: true
ledger_enable_h5_persistence: false
ledger_flush_max_rows: 15000
ledger_flush_interval: 30.0

# Configure clients
serving_grpc: true
serving_cli: false

# DataLoader parameters
data:
  train_loader:
    shuffle: true
    batch_size: 16
    max_samples: 250
  val_loader:
    shuffle: false
    batch_size: 16
    max_samples: 100
  test_loader:
    shuffle: false
    batch_size: 16
    drop_last: false
    max_samples: 200
