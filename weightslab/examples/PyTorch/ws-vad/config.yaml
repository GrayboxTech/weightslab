experiment_name: vad_unet
root_log_dir: ./logs/vad/0
# Absolute path to your VAD data root (can also be set at runtime via the WL UI)
data_root: /Users/marcgraybx/graybox/development/data/VAD

# ── Model ────────────────────────────────────────────────────────────────────
base_channels: 8          # channel multiplier for UNetMulti
image_size: 256           # both H and W are resized to this

# ── Training ─────────────────────────────────────────────────────────────────
lr: 0.001
batch_size: 16
training_steps: 200000
eval_every: 200           # evaluate test set every N training steps

# ── Loss weights ─────────────────────────────────────────────────────────────
recon_weight: 0.3         # MSE reconstruction vs. BCE classification trade-off

# ── WeightsLab backend ───────────────────────────────────────────────────────
serving_grpc: true
serving_cli: false
enable_h5_persistence: true

# ── Per-loader data config ────────────────────────────────────────────────────
data:
  train_loader:
    batch_size: 16
    shuffle: true
  test_loader:
    batch_size: 16
    shuffle: false
