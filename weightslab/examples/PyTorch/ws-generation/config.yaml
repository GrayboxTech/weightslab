experiment_name: vad_unet
# root_log_dir:  # Empty to write in tmp directory, or specify a path to store logs and checkpoints

# ── Model ────────────────────────────────────────────────────────────────────
base_channels: 8          # channel multiplier for UNetMulti
image_size: 256           # both H and W are resized to this

# ── Training ─────────────────────────────────────────────────────────────────
lr: 0.0001
batch_size: 16
training_steps: 200000
eval_full_to_train_steps_ratio: 200           # evaluate test set every N training steps
experiment_dump_to_train_steps_ratio: 5

# ── Loss weights ─────────────────────────────────────────────────────────────
recon_weight: 2.0         # MSE reconstruction vs. BCE classification trade-off
contrastive_weight: 1.0   # organized embedding space weight

# ── WeightsLab backend ───────────────────────────────────────────────────────
serving_grpc: true
serving_cli: false
enable_h5_persistence: true

# ── Per-loader data config ────────────────────────────────────────────────────
# data_root:  # Absolute path to your VAD data root (can also be set at runtime via the WL UI)
data:
  train_loader:
    batch_size: 16
    shuffle: true
  test_loader:
    batch_size: 16
    shuffle: false
