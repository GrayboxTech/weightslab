# =============================================================================
# WeightsLab training docker — Docker-in-Docker (DinD) variant
# =============================================================================
# One container that runs its own docker daemon, the WeightsLab CLI, and the
# training process. The Envoy + frontend containers live *inside* this
# container's daemon, so we re-publish their ports (8080, 5173) from this
# container out to the host for the browser.
# =============================================================================
services:
  trainer:
    build:
      context: .
      # To use your local dev branch instead of PyPI, uncomment:
      # args:
      #   WEIGHTSLAB_SPEC: "git+https://github.com/GrayboxTech/weightslab.git@dev"
    image: weightslab-trainer-dind
    container_name: weightslab_trainer_dind
    # Required so the inner dockerd can run (DinD).
    privileged: true
    # --- GPU ------------------------------------------------------------------
    # Grant the host NVIDIA GPU(s) to the TRAINER container (the torch training
    # runs here; the nested Envoy/frontend don't need a GPU). Requires the NVIDIA
    # Container Toolkit on the host. NOTE: this is a hard requirement — on a host
    # with no NVIDIA GPU/toolkit, comment out this whole `deploy:` block (the
    # stack then runs on CPU; the entrypoint's nvidia-smi check degrades cleanly).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # or e.g. count: 1, or device_ids: ["0"]
              capabilities: [gpu]
    environment:
      # Port the in-process gRPC backend binds to and Envoy dials. The inner
      # Envoy reaches it via grpc-backend:host-gateway, which (inside DinD)
      # resolves to THIS container — where the backend listens. No host
      # publishing of 50051 is needed (contrast with the siblings variant).
      - GRPC_BACKEND_PORT=50051
      # TLS toggle: run `WEIGHTSLAB_TLS=1 docker compose up` for HTTPS + mTLS
      # (generates certs in-container; trust ca.crt on the host — see README).
      - WEIGHTSLAB_TLS=${WEIGHTSLAB_TLS:-0}
    ports:
      # Re-publish the inner stack's browser-facing ports to the host.
      - "5173:5173"   # Weights Studio frontend  -> http://localhost:5173
      - "8080:8080"   # Envoy gRPC-web (browser -> backend)
    volumes:
      # Persist the inner daemon's image/layer store across restarts so we don't
      # re-pull envoy + graybx/weightslab every run.
      - dind_storage:/var/lib/docker
    # The inner daemon + image pulls need a moment; give the stack room to start.
    stop_grace_period: 30s

volumes:
  dind_storage:
