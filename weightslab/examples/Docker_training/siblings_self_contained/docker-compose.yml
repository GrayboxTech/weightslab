# =============================================================================
# WeightsLab training docker — self-contained siblings (no host bind mounts)
# =============================================================================
# The trainer drives the HOST docker daemon (mounted socket) to start Envoy +
# frontend as siblings — but with ZERO host bind mounts and NO path alignment,
# so it runs natively on Windows / Docker Desktop and needs no setup-host.sh.
# The gRPC backend runs in THIS container and is published to the host so the
# sibling Envoy can reach it via host-gateway.
# =============================================================================
services:
  trainer:
    build:
      context: .
      # Dev branch instead of PyPI:
      # args:
      #   WEIGHTSLAB_SPEC: "git+https://github.com/GrayboxTech/weightslab.git@dev"
    image: weightslab-trainer-selfcontained
    container_name: weightslab_trainer_selfcontained
    # --- GPU ------------------------------------------------------------------
    # Grant the host NVIDIA GPU(s) to the trainer (torch runs here; the sibling
    # Envoy/frontend don't need a GPU). Requires the NVIDIA Container Toolkit.
    # NOTE: hard requirement — on a host with no NVIDIA GPU/toolkit, comment out
    # this `deploy:` block (the stack then runs on CPU).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # or e.g. count: 1, or device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - GRPC_BACKEND_PORT=50051
      # TLS toggle: run `WEIGHTSLAB_TLS=1 docker compose up` for HTTPS + mTLS
      # (certs generated in-container + delivered via named volumes; trust
      # ca.crt on the host — see README "Enabling TLS").
      - WEIGHTSLAB_TLS=${WEIGHTSLAB_TLS:-0}
    ports:
      # Publish the gRPC backend so the sibling Envoy reaches it via
      # grpc-backend:host-gateway -> host:50051 -> this container. Envoy + the
      # frontend publish 8080/5173 to the host themselves (see ui-compose.yml).
      - "50051:50051"
    volumes:
      # Only mount: the host docker socket. NO source/cert bind mounts.
      - /var/run/docker.sock:/var/run/docker.sock
