syntax = "proto3";
package sdk_services;

import "experiment_command.proto";
import "streaming_signals.proto";


// Empty message to represent an empty request or response is expected
message Empty {}

// Interface to communicate btw UI and SDK
service ExperimentService {
  // Watch Experiment Signals (e.g., metrics, losses, etc..)
  rpc WatchSignals (Empty) returns (stream sdk_streaming_signals.W_TrainingStatusEx);

  // Watch or Edit Experiment (hyperparameters, name, etc..)
  rpc WatchOrEditExperiment (sdk_experiment_command.ExperimentCommand) returns (sdk_experiment_command.ExperimentResponse);

  // Watch or Edit Computational Graph (weights, biases, layers, parameters, etc..)
  rpc WatchOrEditGraph (sdk_computational_graph.GraphCommand) returns (sdk_computational_graph.GraphResponse);
}
