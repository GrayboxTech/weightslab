syntax = "proto3";


service ExperimentService {
  rpc GetLatestLoggerData (GetLatestLoggerDataRequest) returns (GetLatestLoggerDataResponse);

  rpc ExperimentCommand (TrainerCommand) returns (CommandResponse);

  rpc ManipulateWeights(WeightsOperationRequest) returns (WeightsOperationResponse);

  rpc GetWeights(WeightsRequest) returns (WeightsResponse);

  rpc GetActivations(ActivationRequest) returns (ActivationResponse);

  rpc GetSamples (BatchSampleRequest) returns (BatchSampleResponse);

  // Data Service (for weights_studio UI)
  rpc ApplyDataQuery (DataQueryRequest) returns (DataQueryResponse);
  rpc GetDataSamples (DataSamplesRequest) returns (DataSamplesResponse);
  // Server-side histogram binning of one metadata/signal column.
  rpc GetHistogram (HistogramRequest) returns (HistogramResponse);
  // Metadata-only retrieval (dataframe columns). Returns every metadata column
  // name for the WHOLE dataset, the current grid slice's per-sample metadata, and
  // the open modal sample's metadata. Separated from GetDataSamples, which now
  // returns only image / label / prediction data.
  rpc GetMetaData (GetMetaDataRequest) returns (GetMetaDataResponse);
  // Raw point cloud of one sample (task_type "detection_pointcloud"), server-streamed
  // in binary chunks for the interactive 3D viewer.
  rpc GetPointCloud (PointCloudRequest) returns (stream PointCloudChunk);
  rpc EditDataSample (DataEditsRequest) returns (DataEditsResponse);
  rpc GetDataSplits (Empty) returns (DataSplitsResponse);
  rpc CheckAgentHealth (Empty) returns (AgentHealthResponse);
  rpc InitializeAgent (InitializeAgentRequest) returns (InitializeAgentResponse);
  rpc ChangeAgentModel (ChangeAgentModelRequest) returns (ChangeAgentModelResponse);
  rpc GetAgentModels (GetAgentModelsRequest) returns (GetAgentModelsResponse);
  rpc ResetAgent (Empty) returns (ResetAgentResponse);

  // Checkpoint restore
  rpc RestoreCheckpoint (RestoreCheckpointRequest) returns (RestoreCheckpointResponse);

  // Evaluation mode
  rpc TriggerEvaluation (TriggerEvaluationRequest) returns (TriggerEvaluationResponse);
  rpc GetEvaluationStatus (GetEvaluationStatusRequest) returns (GetEvaluationStatusResponse);
  rpc CancelEvaluation (CancelEvaluationRequest) returns (CancelEvaluationResponse);
}

// --- Logger Data Sync ---
message GetLatestLoggerDataRequest {
  bool request_full_history = 1;  // true = full history, false = only queue (new data)
  int32 max_points = 2;            // max points per signal (only used for full history)
  bool break_by_slices = 3;        // true = return per-sample data filtered by tags
  repeated string tags = 4;        // list of tags to filter samples (used when break_by_slices=true)
  string graph_name = 5;           // specific signal/graph name to filter (used when break_by_slices=true)
}

message LoggerDataPoint {
  string metric_name = 1;          // The metric/signal name (e.g., "train/loss", "eval/accuracy")
  int32 model_age = 2;
  float metric_value = 3;
  string experiment_hash = 4;
  int64 timestamp = 5;
  string sample_id = 6;            // sample_id (used for break_by_slices mode)
  bool is_evaluation_marker = 7;
  string split_name = 8;
  repeated string evaluation_tags = 9;
  string point_note = 10;
  bool audit_mode = 11;            // True if logged during audit mode (read-only inspection)
}

message GetLatestLoggerDataResponse {
  repeated LoggerDataPoint points = 1;  // All points from all metrics
  string weightslab_version = 2;        // backend weightslab package version (shown in UI logo tooltip)
}

message Empty {}

message NeuronId {
  int32 layer_id = 1;
  int32 neuron_id = 2;
}

enum WeightOperationType {
  ZEROFY = 0;
  REINITIALIZE = 1;
  FREEZE = 2;
  REMOVE_NEURONS = 9;
  ADD_NEURONS = 10;
}

enum ZerofyPredicate {
  ZEROFY_PREDICATE_NONE = 0;
  ZEROFY_PREDICATE_WITH_FROZEN = 1;
  ZEROFY_PREDICATE_WITH_OLDER  = 2;
}

message WeightOperation {
  optional WeightOperationType op_type = 1;
  optional int32 layer_id = 2;
  repeated NeuronId neuron_ids = 3;

  int32 neurons_to_add = 9;

  repeated int32 zerofy_from_incoming_ids = 11;
  repeated int32 zerofy_to_neuron_ids = 12;
  repeated ZerofyPredicate zerofy_predicates = 13;
}

message WeightsOperationRequest {
  optional WeightOperation weight_operation = 1;
}

message WeightsOperationResponse {
  bool success = 1;
  string message = 2;
}

message HyperParameters {
  optional string experiment_name = 1;
  optional int32 training_steps_to_do = 2;
  optional float learning_rate = 3;
  optional int32 batch_size = 4;
  optional int32 full_eval_frequency = 5;
  optional int32 checkpont_frequency = 6;
  optional bool is_training = 7;
  optional int32 nb_steps = 8;
  optional bool auditor_mode = 9;
  optional int32 train_batch_size = 10;
  optional int32 val_batch_size = 11;
  optional int32 test_batch_size = 12;
  optional bool evaluation_mode = 13;
  optional string evaluation_config = 14;
}

message MetricsStatus {
  string name = 1;
  float value = 2;
}

message AnnotatStatus {
  string name = 1;
  map<string, float> metadata = 2;
}

message TrainingStatusEx {
  optional string timestamp = 1;
  optional string experiment_name = 2;
  optional int32 model_age = 3;

  optional MetricsStatus metrics_status = 4;
  optional AnnotatStatus annotat_status = 5;
}

message HyperParameterCommand {
  optional HyperParameters hyper_parameters = 1;
}

message DenySamplesOperation {
  repeated string sample_ids = 1;
  bool accumulate = 2;
}

message LoadCheckpointOperation {
  int32 checkpoint_id = 1;
}

message PlotNoteOperation {
  string metric_name = 1;
  string experiment_hash = 2;
  int32 model_age = 3;
  string note = 4;
}

// Manual "save now" trigger: force a checkpoint of the current model weights
// (and, when requested, the architecture) regardless of pending-change tracking.
message SaveCheckpointOperation {
  bool save_architecture = 1;  // force re-dump architecture even if a file already exists
  bool save_optimizer = 2;     // also persist optimizer state
}

message TrainerCommand {
  bool get_hyper_parameters = 4;
  bool get_interactive_layers = 5;
  optional string get_data_records = 6;
  optional int32 get_single_layer_info_id = 8;
  optional HyperParameterCommand hyper_parameter_change = 1;
  optional DenySamplesOperation deny_samples_operation = 7;
  optional DenySamplesOperation deny_eval_samples_operation = 10;
  optional LoadCheckpointOperation load_checkpoint_operation = 9;
  optional DenySamplesOperation remove_from_denylist_operation = 11;
  optional DenySamplesOperation remove_eval_from_denylist_operation = 12;
  optional PlotNoteOperation plot_note_operation = 13;
  optional SaveCheckpointOperation save_checkpoint_operation = 14;
}

message HyperParameterDesc {
  string label = 1;
  string name = 2;
  string type = 3;
  optional float numerical_value = 4;
  optional string string_value = 5;
}

message NeuronStatistics {
  optional NeuronId neuron_id = 1;
  optional int32 neuron_age = 2;
  optional float train_trigger_rate = 3;
  optional float eval_trigger_rate = 4;

  optional float learning_rate = 7;
  map<int32, float> incoming_lr = 8;
}

message LayerRepresentation {
  optional int32 layer_id = 1;
  optional string layer_name = 2;
  optional string layer_type = 3;

  optional int32 neurons_count = 4;
  optional int32 incoming_neurons_count = 5;

  optional int32 kernel_size = 6;
  optional int32 stride = 7;

  repeated NeuronStatistics neurons_statistics = 10;
}

message ActivationRequest {
  int32 layer_id = 1;
  string sample_id = 2;
  string origin = 3;
}

message ActivationMap {
  int32 neuron_id = 1;
  repeated float values = 2;
  int32 H = 3;
  int32 W = 4;
}

message ActivationResponse {
  string layer_type = 1;
  int32 neurons_count = 2;
  repeated ActivationMap activations = 3;
}

message TaskField {
  string name = 1;
  oneof value {
    float float_value = 2;
    int32 int_value = 3;
    string string_value = 4;
    bytes bytes_value = 5;
    bool bool_value = 6;
  }
}

message RecordMetadata {
  string sample_id = 1;
  repeated int32 sample_label = 2;
  repeated int32 sample_prediction = 3;
  map<string, float> sample_last_loss = 4;
  int32 sample_encounters = 5;
  bool sample_discarded = 6;
  repeated TaskField extra_fields = 7;
  bytes prediction_raw = 9;
  string task_type = 10;
}

message SampleStatistics {
  optional string origin = 6;
  optional int32 sample_count = 7;

  string task_type = 9;

  repeated RecordMetadata records = 8;
}

message CommandResponse {
  bool success = 1;
  string message = 2;

  repeated HyperParameterDesc hyper_parameters_descs = 3;
  repeated LayerRepresentation layer_representations = 4;
  optional SampleStatistics sample_statistics = 5;
}

message SampleRequest {
  optional string sample_id = 1;
  optional string origin = 2;
}

message SampleRequestResponse {
  optional string sample_id = 1;
  optional string origin = 2;
  optional int32 label = 3;
  optional bytes data = 4;
  optional string error_message = 5;
  optional bytes raw_data = 6;
  optional bytes mask = 7;
  optional bytes prediction = 8;
}

message BatchSampleRequest {
  repeated string sample_ids = 1;
  string origin = 2;
  optional int32 resize_width = 3;
  optional int32 resize_height = 4;
}

message BatchSampleResponse {
  repeated SampleRequestResponse samples = 1;
}

message WeightsRequest {
  NeuronId neuron_id = 1;
}

message WeightsResponse {
  NeuronId neuron_id = 1;
  optional string layer_name = 2;
  optional string layer_type = 3;

  int32 incoming = 4;
  int32 outgoing = 5;
  optional int32 kernel_size = 6;

  repeated float weights = 7;

  bool success = 11;
  optional string error_message = 12;
}

// ============================================================================
// Data Service Messages (for weights_studio UI integration)
// ============================================================================

message DataQueryRequest {
  string query = 1;
  bool accumulate = 2;
  bool is_natural_language = 3;
}

enum AgentIntentType {
  INTENT_UNKNOWN = 0;
  INTENT_FILTER = 1;
  INTENT_ANALYSIS = 2;
}

// Definition of a categorical (multi-value) tag and its allowed category values.
message CategoricalTagDef {
  string name = 1;                  // tag name without the "tag:" prefix (e.g. "weather")
  repeated string categories = 2;   // allowed values, e.g. ["rainy", "sunny", "cloudy"]
}

message DataQueryResponse {
  bool success = 1;
  string message = 2;
  int32 number_of_all_samples = 3;
  int32 number_of_samples_in_the_loop = 4;
  int32 number_of_discarded_samples = 5;
  repeated string unique_tags = 6;

  AgentIntentType agent_intent_type = 7;
  string analysis_result = 8;

  // Categorical tags (multi-value, string) with their allowed category sets.
  // Boolean tags continue to be reported via `unique_tags`.
  repeated CategoricalTagDef categorical_tags = 9;
}

message DataSamplesRequest {
  int32 start_index = 1;
  int32 records_cnt = 2;
  bool include_transformed_data = 3;
  bool include_raw_data = 4;
  repeated string stats_to_retrieve = 5;
  int32 resize_width = 6;
  int32 resize_height = 7;
}

message DataStat {
  string name = 1;
  string type = 2;
  repeated int32 shape = 3;
  repeated float value = 4;
  string value_string = 5;
  bytes thumbnail = 6;  // Add thumbnail field for compressed JPEG thumbnails
}

message DataRecord {
  string sample_id = 1;
  repeated DataStat data_stats = 2;
}

message DataSamplesResponse {
  bool success = 1;
  string message = 2;
  repeated DataRecord data_records = 3;
}

// --- Server-side histogram binning ---
// One stacked sub-segment of a bar: count of samples in this bin for a given
// (origin, discarded) combination (used to colour train/eval/discarded splits).
message HistogramSubBar {
  string origin = 1;
  bool discarded = 2;
  int64 count = 3;
}

// One histogram bar: aggregate stats over the samples whose row index falls in
// this bin's range, plus the per-(origin,discarded) breakdown.
message HistogramBin {
  double min = 1;
  double max = 2;
  double avg = 3;
  int64 count = 4;
  repeated HistogramSubBar sub_bars = 5;
}

// One bar of a categorical histogram: count of rows with a given string value
// plus the per-(origin,discarded) breakdown for split colouring.
message CategoricalHistogramBar {
  string label = 1;                    // category value ("" = unset / NaN)
  int64 count = 2;                     // total count across all splits
  repeated HistogramSubBar sub_bars = 3;
}

message HistogramRequest {
  string column = 1;     // dataframe/signal column to histogram
  int32 max_bins = 2;    // 0 => server default (512)
}

message HistogramResponse {
  bool success = 1;
  string message = 2;
  int64 total_rows = 3;                // rows in the view that were binned
  repeated HistogramBin bins = 4;      // numeric histogram (is_categorical=false)
  bool is_categorical = 5;             // true => use categorical_bars instead of bins
  repeated CategoricalHistogramBar categorical_bars = 6;
}

// --- Metadata retrieval (separated from GetDataSamples) ---
message GetMetaDataRequest {
  int32 start_index = 1;        // grid slice start (current view order)
  int32 records_cnt = 2;        // grid slice size
  string modal_sample_id = 3;   // optional: sample_id of the open modal ("" = none)
}

message GetMetaDataResponse {
  bool success = 1;
  string message = 2;
  repeated string all_metadata_names = 3;  // every metadata column for the WHOLE dataset
  repeated DataRecord grid_records = 4;     // per-sample metadata for the requested slice
  DataRecord modal_record = 5;              // metadata for the open modal sample (if found)
}

// --- Point cloud transfer (task_type "detection_pointcloud") ---
message PointCloudRequest {
  string sample_id = 1;
  string origin = 2;       // loader name (e.g. "train_loader")
  int32 max_points = 3;    // 0 = use the server default cap
}

message PointCloudChunk {
  bool success = 1;
  string message = 2;
  // Set on the first chunk only:
  int32 num_points = 3;          // total points after downsampling
  int32 num_features = 4;        // column count (>= 2)
  repeated float pc_range = 5;   // x_min, y_min, z_min, x_max, y_max, z_max
  // Every chunk:
  bytes data = 6;                // little-endian float32, row-major slice of [num_points, num_features]
  int32 chunk_index = 7;
  int32 total_chunks = 8;
  // Per-column channel names (first chunk only), e.g.
  // ["x","y","z","intensity"] or ["x","y","z","nx","ny","nz","r","g","b"].
  // Drives the viewer's available colour / shading modes.
  repeated string feature_names = 9;
}

enum SampleEditType {
  EDIT_OVERRIDE = 0;
  EDIT_ACCUMULATE = 1;
  EDIT_REMOVE = 2;
}

message DataEditsRequest {
  string stat_name = 1;
  float float_value = 2;
  string string_value = 3;
  bool bool_value = 4;
  SampleEditType type = 5;
  repeated string samples_ids = 6;
  repeated string sample_origins = 7;

  // --- Categorical tag support ---
  // When is_categorical=true, the edit targets a categorical (multi-value) tag:
  //   stat_name    = "tag:<name>" (the column)
  //   string_value = the category value to set (EDIT_OVERRIDE) or "" to clear
  //   categories   = optional full allowed-value set to (re)declare for this tag
  // EDIT_REMOVE with float_value == -1 still deletes the whole tag column.
  bool is_categorical = 8;
  repeated string categories = 9;
}

message DataEditsResponse {
  bool success = 1;
  string message = 2;
}

message DataSplitsResponse {
  bool success = 1;
  repeated string split_names = 2;
}

message AgentHealthResponse {
  bool available = 1;
  string message = 2;
}

// --- Agent Onboarding ---
enum AgentProviderType {
  PROVIDER_OPENROUTER = 0;
}

message InitializeAgentRequest {
  string api_key = 1;
  AgentProviderType provider = 2;
  string model = 3;
}

message InitializeAgentResponse {
  bool success = 1;
  string message = 2;
}

message ChangeAgentModelRequest {
  string model = 1;
}

message ChangeAgentModelResponse {
  bool success = 1;
  string message = 2;
}

message GetAgentModelsRequest {}

message GetAgentModelsResponse {
  bool success = 1;
  repeated string models = 2;
  string message = 3;
}

message ResetAgentResponse {
  bool success = 1;
  string message = 2;
}

// --- Checkpoint Restore ---
message RestoreCheckpointRequest {
  string experiment_hash = 1;  // Hash code of checkpoint to restore
}

message RestoreCheckpointResponse {
  bool success = 1;            // Whether restore was successful
  string message = 2;          // Details/error message
}

// --- Evaluation Mode ---
message TriggerEvaluationRequest {
  string split_name = 1;
  repeated string tags = 2;
  bool use_full_set = 3;
}

message TriggerEvaluationResponse {
  bool success = 1;
  string message = 2;
}

message GetEvaluationStatusRequest {}

message GetEvaluationStatusResponse {
  string status = 1;
  int32 current = 2;
  int32 total = 3;
  string message = 4;
  string error = 5;
  string split_name = 6;
}

message CancelEvaluationRequest {
  string reason = 1;
}

message CancelEvaluationResponse {
  bool success = 1;
  string message = 2;
}
