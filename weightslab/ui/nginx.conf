upstream backend {
    server host.docker.internal:50051;
}

upstream envoy {
    server weights_studio_envoy:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to backend through Envoy
    location /api/ {
        proxy_pass http://envoy/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # gRPC proxy
    location ~ ^/grpc {
        proxy_pass http://envoy;
        proxy_http_version 2;
        proxy_set_header Content-Type application/grpc;
        proxy_set_header grpc-encoding gzip;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
    }

    # SPA fallback - all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
