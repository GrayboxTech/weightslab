# Global Docker Compose configuration for Weights Studio
services:
  # Envoy proxy for gRPC-Web
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: weights_studio_envoy
    ports:
      - "${ENVOY_PORT:-8080}:${ENVOY_PORT:-8080}"
    volumes:
      - ../envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ../envoy/certs:/etc/envoy/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GRPC_BACKEND_PORT=${GRPC_BACKEND_PORT:-50051}
    command:
      - /bin/sh
      - -c
      - |
        PORT=$${GRPC_BACKEND_PORT:-50051}
        sed "s/__GRPC_BACKEND_PORT__/$${PORT}/g" /etc/envoy/envoy.yaml > /tmp/envoy.generated.yaml && \
        exec /usr/local/bin/envoy -c /tmp/envoy.generated.yaml
    networks:
      - weights_studio_network
    restart: unless-stopped

  # Weights Studio frontend (production static server)
  # Note: Frontend is accessed through Envoy proxy (HTTPS on 8080), not directly
  weights_studio:
    image: weights_studio_frontend  # graybx/weightslab:latest
    container_name: weights_studio_frontend
    # Access via Envoy proxy on port 8080 (HTTPS) instead of direct port
    # ports:
    #   - "${VITE_PORT:-5173}:80"  # Direct access (HTTP only) - use Envoy instead
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - WS_SERVER_HOST=${WS_SERVER_HOST:-localhost}
      - WS_SERVER_PORT=${WS_SERVER_PORT:-8080}
      - WS_SERVER_PROTOCOL=${WS_SERVER_PROTOCOL:-https}
    depends_on:
      - envoy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - weights_studio_network
    restart: unless-stopped

networks:
  weights_studio_network:
    driver: bridge
