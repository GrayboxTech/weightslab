name: Cleanup Caches & Artifacts

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Install prerequisites
        run: |
          apt-get update && apt-get install -y --no-install-recommends curl ca-certificates jq
          rm -rf /var/lib/apt/lists/*

      - name: Delete caches older than 7 days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching Actions caches for ${REPO}..."
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          PAGE=1

          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/actions/caches?per_page=100&page=${PAGE}")

            KEYS=$(echo "${RESPONSE}" | jq -r --arg cutoff "${CUTOFF}" \
              '.actions_caches[] | select(.last_accessed_at < $cutoff) | .id')

            if [ -z "${KEYS}" ]; then
              break
            fi

            for CACHE_ID in ${KEYS}; do
              echo "Deleting cache id=${CACHE_ID}"
              curl -s -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/repos/${REPO}/actions/caches/${CACHE_ID}"
            done

            TOTAL=$(echo "${RESPONSE}" | jq '.total_count')
            PAGE=$((PAGE + 1))
            if [ $((PAGE * 100)) -ge "${TOTAL}" ]; then
              break
            fi
          done

          echo "Cache cleanup complete."

  cleanup-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Install prerequisites
        run: |
          apt-get update && apt-get install -y --no-install-recommends curl ca-certificates jq
          rm -rf /var/lib/apt/lists/*

      - name: Delete artifacts older than 7 days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching workflow artifacts for ${REPO}..."
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          PAGE=1

          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/actions/artifacts?per_page=100&page=${PAGE}")

            IDS=$(echo "${RESPONSE}" | jq -r --arg cutoff "${CUTOFF}" \
              '.artifacts[] | select(.expired == false and .created_at < $cutoff) | .id')

            if [ -z "${IDS}" ]; then
              break
            fi

            for ART_ID in ${IDS}; do
              echo "Deleting artifact id=${ART_ID}"
              curl -s -X DELETE -H "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/repos/${REPO}/actions/artifacts/${ART_ID}"
            done

            TOTAL=$(echo "${RESPONSE}" | jq '.total_count')
            PAGE=$((PAGE + 1))
            if [ $((PAGE * 100)) -ge "${TOTAL}" ]; then
              break
            fi
          done

          echo "Artifact cleanup complete."
