name: Code CI

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]
    types: [ opened, reopened, ready_for_review ]
  workflow_dispatch:

jobs:
  code-quality:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparison

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure cache directories exist
        run: |
          mkdir -p ~/.cache/pip
          mkdir -p ~/.cache/ruff

      - name: Cache pip and Ruff
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ruff
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-lint-cache
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-
            ${{ runner.os }}-

      - name: Get changed Python files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          # Get changed Python files in weightslab directory, and ignore CI workflow YAML files
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT $BASE_SHA $HEAD_SHA | \
            grep -v '^\.github/workflows/.*\.ya\?ml$' | \
            grep '^weightslab/.*\.py$' | \
            grep -v '_pb2\.py$' | \
            grep -v '_pb2_grpc\.py$' | \
            grep -v 'ui\.py$' | \
            grep -v 'trainer.*\.py$' || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -z "$CHANGED_FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "No Python files changed in weightslab directory"
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            echo "$CHANGED_FILES"
          fi

      - name: Install linting tools
        if: steps.changed-files.outputs.has_files == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pylint vulture

      - name: Lint with Ruff (unused, style, bugs)
        if: steps.changed-files.outputs.has_files == 'true'
        run: |
          FILES="${{ steps.changed-files.outputs.changed_files }}"
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs ruff check --select F401,F841,E9,F632,F722,F823 --ignore E501 --fix
          fi

      - name: Pylint (errors only)
        if: steps.changed-files.outputs.has_files == 'true'
        run: |
          FILES="${{ steps.changed-files.outputs.changed_files }}"
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs pylint --disable=R0913,E0401,C0301,W0511,C0114,C0115,C0116 --fail-under=7.0
          fi

      - name: Vulture (unused code)
        if: steps.changed-files.outputs.has_files == 'true'
        run: |
          FILES="${{ steps.changed-files.outputs.changed_files }}"
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs vulture --min-confidence 70 . || true
          fi

  install:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.10","3.11","3.12","3.13","3.14"]') || fromJson('["3.10"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure pip cache directory exists
        run: mkdir -p ~/.cache/pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}
            ${{ runner.os }}-pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify installation
        run: |
          python -c "import sys, weightslab; print(f'weightslab imported successfully on Python {sys.version.split()[0]}')"

  test:
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.10","3.11","3.12","3.13","3.14"]') || fromJson('["3.10"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure pip cache directory exists
        run: mkdir -p ~/.cache/pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}
            ${{ runner.os }}-pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit tests - General
        run: |
          export WEIGHTSLAB_LOG_LEVEL="DEBUG"
          python -m unittest discover -s ./weightslab/tests -p "test_.py" -t . -v

      - name: Run unit tests - Model
        run: |
          export WEIGHTSLAB_LOG_LEVEL="DEBUG"
          python -m unittest discover -s ./weightslab/tests/model -v

      - name: Run unit tests - Data
        run: |
          export WEIGHTSLAB_LOG_LEVEL="DEBUG"
          python -m unittest discover -s ./weightslab/tests/data -v

      - name: Run unit tests - Integrations
        run: |
          export WEIGHTSLAB_LOG_LEVEL="DEBUG"
          python -m unittest discover -s ./weightslab/tests/integrations -v

  trigger-weightsstudio-dispatch:
    if: ${{ (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')) || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev')) }}
    name: Trigger WeightsStudio CI (repository_dispatch)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch ws-ci workflow in weights_studio
        env:
          WS_TOKEN: ${{ secrets.WEIGHTS_STUDIO_API_TOKEN }}
        run: |
          if [ -z "${WS_TOKEN}" ]; then
            echo "WEIGHTS_STUDIO_API_TOKEN not set; cannot dispatch WeightsStudio CI."
            exit 1
          fi

          TARGET_BRANCH="${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}"
          EVENT_TYPE="weightslab_ci_triggered"
          DISPATCH_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          curl -fSs -X POST "https://api.github.com/repos/GrayboxTech/weights_studio/dispatches" \
            -H "Authorization: Bearer ${WS_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "{\"event_type\":\"${EVENT_TYPE}\",\"client_payload\":{\"weightslab_branch\":\"${TARGET_BRANCH}\",\"weightslab_sha\":\"${GITHUB_SHA}\",\"weightslab_repo\":\"${GITHUB_REPOSITORY}\"}}"

          echo "WeightsStudio repository_dispatch sent for branch ${TARGET_BRANCH}. Waiting for ws-ci run to start..."

          WS_RUN_ID=""
          for attempt in $(seq 1 60); do
            RUNS_JSON="$(curl -fSs "https://api.github.com/repos/GrayboxTech/weights_studio/actions/workflows/ws-ci.yml/runs?event=repository_dispatch&branch=${TARGET_BRANCH}&per_page=20" \
              -H "Authorization: Bearer ${WS_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28")"

            WS_RUN_ID="$(printf '%s' "${RUNS_JSON}" | jq -r --arg ts "${DISPATCH_TS}" '.workflow_runs | map(select(.created_at >= $ts)) | sort_by(.created_at) | last | .id // empty')"

            if [ -n "${WS_RUN_ID}" ]; then
              echo "Detected ws-ci run id: ${WS_RUN_ID}"
              break
            fi

            echo "Waiting for ws-ci run to appear (attempt ${attempt}/60)..."
            sleep 5
          done

          if [ -z "${WS_RUN_ID}" ]; then
            echo "Could not detect a ws-ci run in weights_studio after dispatch."
            exit 1
          fi

          echo "Waiting for ws-ci run ${WS_RUN_ID} completion..."
          for attempt in $(seq 1 120); do
            RUN_JSON="$(curl -fSs "https://api.github.com/repos/GrayboxTech/weights_studio/actions/runs/${WS_RUN_ID}" \
              -H "Authorization: Bearer ${WS_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28")"

            WS_STATUS="$(printf '%s' "${RUN_JSON}" | jq -r '.status // ""')"

            WS_CONCLUSION="$(printf '%s' "${RUN_JSON}" | jq -r '.conclusion // ""')"

            echo "ws-ci status: ${WS_STATUS}, conclusion: ${WS_CONCLUSION}"

            if [ "${WS_STATUS}" = "completed" ]; then
              if [ "${WS_CONCLUSION}" = "success" ]; then
                echo "WeightsStudio ws-ci completed successfully."
                exit 0
              fi

              echo "WeightsStudio ws-ci failed with conclusion: ${WS_CONCLUSION}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for WeightsStudio ws-ci completion."
          exit 1

  build-and-publish-dev:
    if: ${{ github.event_name == 'pull_request' }}
    name: Build & Publish Dev (TestPyPI)
    needs: trigger-weightsstudio-dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      published_version: ${{ steps.version.outputs.published_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Compute publish version
        id: version
        run: |
          TS="$(date -u +%Y%m%d%H%M%S)"
          SHA_HEX="$(git rev-parse --short=8 HEAD)"
          # TestPyPI/PyPI reject local versions (+sha), so encode sha as decimal in devN.
          SHA_DEC="$((16#${SHA_HEX}))"
          PRETEND="${TS}.dev${SHA_DEC}"
          echo "published_version=${PRETEND}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${PRETEND} (from sha ${SHA_HEX})"

      - name: Build distributions
        env:
          # Package-specific override is the most reliable way with setuptools_scm.
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WEIGHTSLAB: ${{ steps.version.outputs.published_version }}
        run: |
          echo "Building with version ${SETUPTOOLS_SCM_PRETEND_VERSION_FOR_WEIGHTSLAB}"
          python -m build

      - name: Verify built artifact version
        env:
          WL_VERSION: ${{ steps.version.outputs.published_version }}
        run: |
          ls -la dist
          if ls dist | grep -q "0.0.0"; then
            echo "Build still produced 0.0.0 artifacts"
            exit 1
          fi
          if ! ls dist | grep -q "${WL_VERSION}"; then
            echo "Expected version ${WL_VERSION} not found in dist artifacts"
            exit 1
          fi

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "TEST_PYPI_API_TOKEN not set; skipping TestPyPI upload."
            exit 0
          fi
          python -m twine upload --repository-url https://test.pypi.org/legacy/ --verbose dist/*

  test-install-from-pip-dev:
    if: ${{ github.event_name == 'pull_request' }}
    name: Test Install From Pip Dev
    needs: build-and-publish-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create isolated virtual environment
        run: |
          python -m venv .venv-ci

      - name: Install from TestPyPI (wait until indexed)
        env:
          WL_VERSION: ${{ needs.build-and-publish-dev.outputs.published_version }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published version from upstream job"
            exit 1
          fi

          # TestPyPI can take a few minutes to expose newly uploaded versions.
          for attempt in $(seq 1 60); do
            echo "Checking pip visibility for weightslab==${WL_VERSION} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url https://test.pypi.org/simple/ \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION} in TestPyPI simple index"
              break
            fi

            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on TestPyPI simple index"
              exit 1
            fi
            sleep 7
          done

          python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple "weightslab==${WL_VERSION}" --no-cache-dir --retries 10 --timeout 60
          echo "weightslab==${WL_VERSION} installed from TestPyPI"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "import weightslab; import importlib.metadata as m; print('weightslab import OK'); print('installed version:', m.version('weightslab'))"
