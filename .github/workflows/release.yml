name: Release CI

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  detect-release-channel:
    name: Detect Release Channel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch' }}
    outputs:
      channel: ${{ steps.detect.outputs.channel }}
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
      simple_index_url: ${{ steps.detect.outputs.simple_index_url }}
      tag_commit_short: ${{ steps.detect.outputs.tag_commit_short }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect tag channel (main/dev)
        id: detect
        run: |
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF}")"
          echo "Tag ref: ${GITHUB_REF}"
          echo "Tag commit: ${TAG_COMMIT}"
          echo "Main head: $(git rev-parse refs/remotes/origin/main)"

          IS_ON_MAIN="false"
          IS_ON_DEV="false"

          if git merge-base --is-ancestor "${TAG_COMMIT}" refs/remotes/origin/main; then
            IS_ON_MAIN="true"
          fi

          if git merge-base --is-ancestor "${TAG_COMMIT}" refs/remotes/origin/dev; then
            IS_ON_DEV="true"
          fi

          echo "is_on_main=${IS_ON_MAIN}"
          echo "is_on_dev=${IS_ON_DEV}"

          TAG_COMMIT_SHORT="$(git rev-parse --short "${TAG_COMMIT}")"
          echo "tag_commit_short=${TAG_COMMIT_SHORT}" >> "$GITHUB_OUTPUT"

          if [ "${IS_ON_MAIN}" = "true" ]; then
            echo "channel=main" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "simple_index_url=https://pypi.org/simple/" >> "$GITHUB_OUTPUT"
          elif [ "${IS_ON_DEV}" = "true" ]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "simple_index_url=https://test.pypi.org/simple/" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${GITHUB_REF} does not point to a commit on main or dev"
            exit 1
          fi

  build-and-publish:
    name: Build & Publish
    needs: detect-release-channel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ needs.detect-release-channel.outputs.channel == 'main' || needs.detect-release-channel.outputs.channel == 'dev' }}
    outputs:
      published_version: ${{ steps.capture-version.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Capture built version
        id: capture-version
        run: |
          WHEEL_PATH="$(ls dist/weightslab-*.whl | head -n 1)"
          if [ -z "${WHEEL_PATH}" ]; then
            echo "No wheel found in dist/"
            exit 1
          fi
          WHEEL_FILE="$(basename "${WHEEL_PATH}")"
          WL_VERSION="$(echo "${WHEEL_FILE}" | sed -E 's/^weightslab-([^-]+)-.*/\1/')"
          if [ -z "${WL_VERSION}" ]; then
            echo "Could not parse version from ${WHEEL_FILE}"
            exit 1
          fi
          echo "published_version=${WL_VERSION}" >> $GITHUB_OUTPUT
          echo "Built version: ${WL_VERSION}"

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/*

      - name: Publish to PyPI (main)
        if: ${{ needs.detect-release-channel.outputs.channel == 'main' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "PYPI_API_TOKEN not set; skipping PyPI upload."
            exit 0
          fi
          python -m twine upload dist/* --repository-url https://upload.pypi.org/legacy/ --non-interactive --verbose

      - name: Publish to TestPyPI (dev)
        if: ${{ needs.detect-release-channel.outputs.channel == 'dev' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "TEST_PYPI_API_TOKEN not set; skipping TestPyPI upload."
            exit 0
          fi
          python -m twine upload dist/* --repository-url https://test.pypi.org/legacy/ --non-interactive --verbose

  test-install-from-pip:
    name: Test Install From Pip
    needs: [detect-release-channel, build-and-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ needs.detect-release-channel.outputs.channel == 'main' || needs.detect-release-channel.outputs.channel == 'dev' }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create isolated virtual environment
        run: |
          python -m venv .venv-ci

      - name: Install from package index (with retry)
        env:
          WL_VERSION: ${{ needs.build-and-publish.outputs.published_version }}
          WL_CHANNEL: ${{ needs.detect-release-channel.outputs.channel }}
          WL_SIMPLE_INDEX: ${{ needs.detect-release-channel.outputs.simple_index_url }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published version from upstream job"
            exit 1
          fi

          if [ -z "${WL_SIMPLE_INDEX}" ]; then
            echo "Missing package index URL from channel detection"
            exit 1
          fi

          # Package indexes can take a few minutes to expose newly uploaded versions.
          for attempt in $(seq 1 60); do
            echo "Checking pip visibility for weightslab==${WL_VERSION} in ${WL_SIMPLE_INDEX} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url "${WL_SIMPLE_INDEX}" \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION}"
              break
            fi

            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on ${WL_SIMPLE_INDEX}"
              exit 1
            fi
            sleep 7
          done

          if [ "${WL_CHANNEL}" = "dev" ]; then
            python -m pip install \
              --index-url "${WL_SIMPLE_INDEX}" \
              --extra-index-url https://pypi.org/simple/ \
              --extra-index-url https://download.pytorch.org/whl/cpu \
              "weightslab==${WL_VERSION}" \
              --no-cache-dir
          else
            python -m pip install \
              --index-url "${WL_SIMPLE_INDEX}" \
              --extra-index-url https://download.pytorch.org/whl/cpu \
              "weightslab==${WL_VERSION}" \
              --no-cache-dir
          fi

          echo "weightslab==${WL_VERSION} installed from ${WL_SIMPLE_INDEX}"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "import weightslab; import importlib.metadata as m; print('weightslab import OK'); print('installed version:', m.version('weightslab'))"

  create_release:
    runs-on: ubuntu-latest
    needs: [detect-release-channel, build-and-publish, test-install-from-pip]
    permissions:
      contents: write
    if: ${{ needs.detect-release-channel.outputs.channel == 'main' || needs.detect-release-channel.outputs.channel == 'dev' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist

      - name: Build release body with header, changelog, and auto-generated notes
        env:
          WL_CHANNEL: ${{ needs.detect-release-channel.outputs.channel }}
          WL_COMMIT_SHORT: ${{ needs.detect-release-channel.outputs.tag_commit_short }}
        run: |
          DATE_UTC="$(date -u +'%Y-%m-%d')"

          # Build header with weightslab banner image
          cat > release_body.md <<EOF
          ![WeightsLab](https://raw.githubusercontent.com/GrayboxTech/.github/main/profile/GitHub_banner_WL.png)

          ## WeightsLab Release

          - Date (UTC): ${DATE_UTC}
          - Commit: ${WL_COMMIT_SHORT}
          - Channel: ${WL_CHANNEL}

          EOF

          # Add changelog if it exists
          if [ -f "CHANGELOG.md" ]; then
            echo "" >> release_body.md
            echo "---" >> release_body.md
            echo "" >> release_body.md

            # For dev releases, replace [Unreleased] with [dev-release]
            if [ "${WL_CHANNEL}" = "dev" ]; then
              sed 's/\[Unreleased\]/[dev-release]/g' CHANGELOG.md >> release_body.md
            else
              cat CHANGELOG.md >> release_body.md
            fi

            echo "" >> release_body.md
            echo "---" >> release_body.md
          fi

          # Add placeholder for auto-generated notes (will be appended by action)
          echo "" >> release_body.md
          echo "## Merged Pull Requests" >> release_body.md
          echo "" >> release_body.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}${{ needs.detect-release-channel.outputs.channel == 'dev' && ' (Dev/TestPyPI)' || '' }}
          prerelease: ${{ needs.detect-release-channel.outputs.is_prerelease == 'true' }}
          body_path: release_body.md
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
