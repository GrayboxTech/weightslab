name: Release CI

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # ── Routing ───────────────────────────────────────────────────────────────
  # Detect whether the tagged commit lives on main (→ PyPI production release)
  # or anywhere else (→ TestPyPI pre-release).  All downstream jobs branch on
  # this output so only the correct path runs.
  detect-target:
    name: Detect release target
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      is_main: ${{ steps.check.outputs.is_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether the tag commit is on main
        id: check
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF}")"
          IS_ON_MAIN=$(git merge-base --is-ancestor "${TAG_COMMIT}" origin/main \
                       && echo "true" || echo "false")
          echo "is_main=${IS_ON_MAIN}" >> $GITHUB_OUTPUT
          echo "Tag: ${GITHUB_REF_NAME}  commit: ${TAG_COMMIT}  on_main: ${IS_ON_MAIN}"

  # ── Shared: run tests before main publish only ───────────────────────────
  test:
    name: Run Tests Before Release
    needs: detect-target
    runs-on: ubuntu-latest
    if: ${{ needs.detect-target.outputs.is_main == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[utest] --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: |
          export WEIGHTSLAB_LOG_LEVEL="DEBUG"
          python -m pip install pytorch_lightning
          python -m unittest discover -s ./weightslab/tests -p "test_*.py" -t . -v

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV RELEASE — tag on dev branch, not yet merged to main
  # Publishes to TestPyPI and creates a GitHub pre-release.
  # ═══════════════════════════════════════════════════════════════════════════

  build-and-publish-dev-release:
    name: Build & Publish Dev Release (TestPyPI)
    needs: detect-target
    runs-on: ubuntu-latest
    if: ${{ needs.detect-target.outputs.is_main != 'true' }}
    permissions:
      contents: read
    outputs:
      published_version: ${{ steps.version.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Capture version from wheel
        id: version
        run: |
          WHEEL="$(ls dist/weightslab-*.whl | head -n 1)"
          if [ -z "${WHEEL}" ]; then echo "No wheel found"; exit 1; fi
          VERSION="$(basename "${WHEEL}" | sed -E 's/^weightslab-([^-]+)-.*/\1/')"
          echo "published_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Dev release version: ${VERSION}"

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "TEST_PYPI_API_TOKEN not set; skipping TestPyPI upload."
            exit 0
          fi
          python -m twine upload --repository-url https://test.pypi.org/legacy/ --verbose dist/*

      - name: Upload build artifacts for release
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-dist
          path: dist/
          retention-days: 1

  # ── Cross-version install test from TestPyPI (Dev Release) ───────────────
  test-install-from-pip-dev-release:
    name: Test Install From TestPyPI — Python ${{ matrix.python-version }} (Dev Release)
    needs: build-and-publish-dev-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
          - python-version: '3.11'
          - python-version: '3.12'
          - python-version: '3.13'
          - python-version: '3.14'
            allow-prereleases: true
    continue-on-error: ${{ matrix.allow-prereleases == true }}
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases || false }}

      - name: Create isolated virtual environment
        run: python -m venv .venv-ci

      - name: Install from TestPyPI (wait until indexed)
        env:
          WL_VERSION: ${{ needs.build-and-publish-dev-release.outputs.published_version }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published_version from upstream job"; exit 1
          fi

          for attempt in $(seq 1 60); do
            echo "Checking TestPyPI for weightslab==${WL_VERSION} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url https://test.pypi.org/simple/ \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION}"
              break
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on TestPyPI"; exit 1
            fi
            sleep 7
          done

          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "weightslab==${WL_VERSION}" --no-cache-dir --retries 10 --timeout 60
          echo "weightslab==${WL_VERSION} installed on Python ${{ matrix.python-version }}"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "
          import weightslab, importlib.metadata as m
          print('weightslab import OK on Python ${{ matrix.python-version }}')
          print('installed version:', m.version('weightslab'))
          "

  create-dev-release:
    name: Create GitHub Pre-Release
    needs: [build-and-publish-dev-release, test-install-from-pip-dev-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-release-dist
          path: dist/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export VERSION="${GITHUB_REF_NAME}"
          export VERSION_NO_V="${VERSION#v}"
          export PYPI_URL="https://test.pypi.org/project/weightslab/${VERSION_NO_V}/"

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            export PREV_TAG_DATE=$(git log -1 --format="%aI" "${PREV_TAG}" 2>/dev/null || echo "2020-01-01T00:00:00Z")
            export GIT_RANGE="${PREV_TAG}..HEAD"
          else
            export PREV_TAG_DATE="2020-01-01T00:00:00Z"
            export GIT_RANGE="HEAD"
          fi

          export COMMITS
          COMMITS=$(git log "${GIT_RANGE}" --no-merges --format="- %h %s" 2>/dev/null | head -25 || true)
          [ -z "$COMMITS" ] && COMMITS="_(no commits found)_"

          export GIT_AUTHORS
          GIT_AUTHORS=$(git log "${GIT_RANGE}" --format="%an" 2>/dev/null | sort -u | sed 's/^/- /' | head -30 || true)

          export PRS_JSON
          PRS_JSON=$(gh pr list --state merged --base "dev" --limit 100 \
            --json number,title,mergedAt,url,author,body,commits \
            2>/dev/null || echo "[]")

          python3 << 'PYEOF'
          import os, json
          version     = os.environ["VERSION"]
          pypi_url    = os.environ["PYPI_URL"]
          prev_date   = os.environ.get("PREV_TAG_DATE", "2020-01-01")
          commits     = os.environ.get("COMMITS", "_(no commits found)_")
          git_authors = os.environ.get("GIT_AUTHORS", "")
          try:
            prs_data = json.loads(os.environ.get("PRS_JSON", "[]"))
          except Exception:
            prs_data = []
          def _pr_entry(pr):
            line = f"- [#{pr['number']}]({pr['url']}) {pr['title']} — {pr['mergedAt'][:10]}"
            desc = " ".join((pr.get("body") or "").split())  # collapse newlines/whitespace
            if desc:
              if len(desc) > 512:
                desc = desc[:509].rstrip() + "..."
              line += f"\n\n  > {desc}"
            return line
          filtered = [pr for pr in prs_data if pr.get("mergedAt", "") > prev_date]
          # "What's Changed precisely": list each merged PR's own developer commits,
          # NOT the squashed/merge/chore commits that land on the release branch
          # (those are redundant with the PR list above and not useful).
          _seen_commits = set()
          _commit_blocks = []
          for pr in filtered:
            _commit_lines = []
            for c in (pr.get("commits") or []):
              oid = (c.get("oid") or "")[:7]
              head = (c.get("messageHeadline") or "").strip()
              if not head or head.startswith("Merge "):
                continue
              key = (oid, head)
              if key in _seen_commits:
                continue
              _seen_commits.add(key)
              _commit_lines.append(f"  - `{oid}` {head}")
            if _commit_lines:
              _commit_blocks.append(
                f"**[#{pr['number']}]({pr['url']}) {pr['title']}**\n" + "\n".join(_commit_lines)
              )
          # Fall back to the raw git log only when no PR commits are available.
          commits_section = "\n\n".join(_commit_blocks) if _commit_blocks else commits
          if filtered:
            prs_lines = "\n".join(_pr_entry(pr) for pr in filtered)
            seen, clabels = set(), []
            for pr in filtered:
              login = pr.get("author", {}).get("login", "")
              if login and login not in seen:
                seen.add(login)
                clabels.append(f"- [{login}](https://github.com/{login})")
            contributors = "\n".join(sorted(clabels))
          else:
            prs_lines = "_(no pull requests found since last release)_"
            contributors = git_authors or "_(no contributors found)_"
          body = (
            "## **Weightslab**\n\n"
            "Follow us on [LinkedIn](https://www.linkedin.com/company/graybx-com/)"
            " | [Graybx](https://www.graybx.com/)\n\n"
            "---\n\n"
            "### Welcome\n\n"
            f"Welcome to the **{version}** release of WeightsLab. "
            "This release was made with the idea to improve how you "
            "Inspect Data, Edit and Evolve Neural Networks, all by Graybx:\n\n"
            f"{prs_lines}\n\n"
            "One platform. Unmatched flexibility. Ultimate control.  \n"
            f"Make sure to install our last version on [TestPyPI]({pypi_url})\n\n"
            "Happy Training!\n\n"
            "---\n\n"
            "### What's Changed precisely:\n\n"
            f"{commits_section}\n\n"
            "---\n\n"
            "### Thank you!\n\n"
            f"{contributors}\n"
          )
          with open("RELEASE_NOTES.md", "w") as f:
            f.write(body)
          PYEOF

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dev Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # MAIN RELEASE — tag on main branch
  # Publishes to production PyPI and creates a GitHub full release.
  # ═══════════════════════════════════════════════════════════════════════════

  build-and-publish-main:
    name: Build & Publish Main (PyPI)
    needs: [detect-target]
    runs-on: ubuntu-latest
    if: ${{ needs.detect-target.outputs.is_main == 'true' }}
    permissions:
      contents: read
    outputs:
      published_version: ${{ steps.version.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Capture version from wheel
        id: version
        run: |
          WHEEL="$(ls dist/weightslab-*.whl | head -n 1)"
          if [ -z "${WHEEL}" ]; then echo "No wheel found"; exit 1; fi
          VERSION="$(basename "${WHEEL}" | sed -E 's/^weightslab-([^-]+)-.*/\1/')"
          echo "published_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Main release version: ${VERSION}"

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "PYPI_API_TOKEN not set; skipping PyPI upload."
            exit 0
          fi
          python -m twine upload dist/* --non-interactive --verbose

      - name: Upload build artifacts for release
        uses: actions/upload-artifact@v4
        with:
          name: main-release-dist
          path: dist/
          retention-days: 1

  # ── Cross-version install test from PyPI (Main Release) ──────────────────
  test-install-from-pip-main:
    name: Test Install From PyPI — Python ${{ matrix.python-version }} (Main Release)
    needs: build-and-publish-main
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create isolated virtual environment
        run: python -m venv .venv-ci

      - name: Install from PyPI (wait until indexed)
        env:
          WL_VERSION: ${{ needs.build-and-publish-main.outputs.published_version }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published_version from upstream job"; exit 1
          fi

          for attempt in $(seq 1 60); do
            echo "Checking PyPI for weightslab==${WL_VERSION} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url https://pypi.org/simple/ \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION}"
              break
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on PyPI"; exit 1
            fi
            sleep 7
          done

          python -m pip install \
            --index-url https://pypi.org/simple/ \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "weightslab==${WL_VERSION}" --no-cache-dir --retries 10 --timeout 60
          echo "weightslab==${WL_VERSION} installed on Python ${{ matrix.python-version }}"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "
          import weightslab, importlib.metadata as m
          print('weightslab import OK on Python ${{ matrix.python-version }}')
          print('installed version:', m.version('weightslab'))
          "

  create-main-release:
    name: Create GitHub Release
    needs: [build-and-publish-main, test-install-from-pip-main]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: main-release-dist
          path: dist/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export VERSION="${GITHUB_REF_NAME}"
          export VERSION_NO_V="${VERSION#v}"
          export PYPI_URL="https://pypi.org/project/weightslab/${VERSION_NO_V}/"

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            export PREV_TAG_DATE=$(git log -1 --format="%aI" "${PREV_TAG}" 2>/dev/null || echo "2020-01-01T00:00:00Z")
            export GIT_RANGE="${PREV_TAG}..HEAD"
          else
            export PREV_TAG_DATE="2020-01-01T00:00:00Z"
            export GIT_RANGE="HEAD"
          fi

          export COMMITS
          COMMITS=$(git log "${GIT_RANGE}" --no-merges --format="- %h %s" 2>/dev/null | head -25 || true)
          [ -z "$COMMITS" ] && COMMITS="_(no commits found)_"

          export GIT_AUTHORS
          GIT_AUTHORS=$(git log "${GIT_RANGE}" --format="%an" 2>/dev/null | sort -u | sed 's/^/- /' | head -30 || true)

          export PRS_JSON
          PRS_JSON=$(gh pr list --state merged --base "main" --limit 100 \
            --json number,title,mergedAt,url,author,body,commits \
            2>/dev/null || echo "[]")

          python3 << 'PYEOF'
          import os, json
          version     = os.environ["VERSION"]
          pypi_url    = os.environ["PYPI_URL"]
          prev_date   = os.environ.get("PREV_TAG_DATE", "2020-01-01")
          commits     = os.environ.get("COMMITS", "_(no commits found)_")
          git_authors = os.environ.get("GIT_AUTHORS", "")
          try:
            prs_data = json.loads(os.environ.get("PRS_JSON", "[]"))
          except Exception:
            prs_data = []
          def _pr_entry(pr):
            line = f"- [#{pr['number']}]({pr['url']}) {pr['title']} — {pr['mergedAt'][:10]}"
            desc = " ".join((pr.get("body") or "").split())  # collapse newlines/whitespace
            if desc:
              if len(desc) > 512:
                desc = desc[:509].rstrip() + "..."
              line += f"\n\n  > {desc}"
            return line
          filtered = [pr for pr in prs_data if pr.get("mergedAt", "") > prev_date]
          # "What's Changed precisely": list each merged PR's own developer commits,
          # NOT the squashed/merge/chore commits that land on the release branch
          # (those are redundant with the PR list above and not useful).
          _seen_commits = set()
          _commit_blocks = []
          for pr in filtered:
            _commit_lines = []
            for c in (pr.get("commits") or []):
              oid = (c.get("oid") or "")[:7]
              head = (c.get("messageHeadline") or "").strip()
              if not head or head.startswith("Merge "):
                continue
              key = (oid, head)
              if key in _seen_commits:
                continue
              _seen_commits.add(key)
              _commit_lines.append(f"  - `{oid}` {head}")
            if _commit_lines:
              _commit_blocks.append(
                f"**[#{pr['number']}]({pr['url']}) {pr['title']}**\n" + "\n".join(_commit_lines)
              )
          # Fall back to the raw git log only when no PR commits are available.
          commits_section = "\n\n".join(_commit_blocks) if _commit_blocks else commits
          if filtered:
            prs_lines = "\n".join(_pr_entry(pr) for pr in filtered)
            seen, clabels = set(), []
            for pr in filtered:
              login = pr.get("author", {}).get("login", "")
              if login and login not in seen:
                seen.add(login)
                clabels.append(f"- [{login}](https://github.com/{login})")
            contributors = "\n".join(sorted(clabels))
          else:
            prs_lines = "_(no pull requests found since last release)_"
            contributors = git_authors or "_(no contributors found)_"
          body = (
            "## **Weightslab**\n\n"
            "Follow us on [LinkedIn](https://www.linkedin.com/company/graybx-com/)"
            " | [Graybx](https://www.graybx.com/)\n\n"
            "---\n\n"
            "### Welcome\n\n"
            f"Welcome to the **{version}** release of WeightsLab. "
            "This release was made with the idea to improve how you "
            "Inspect Data, Edit and Evolve Neural Networks, all by Graybx:\n\n"
            f"{prs_lines}\n\n"
            "One platform. Unmatched flexibility. Ultimate control.  \n"
            f"Make sure to install our last version on [PyPI]({pypi_url})\n\n"
            "Happy Training!\n\n"
            "---\n\n"
            "### What's Changed precisely:\n\n"
            f"{commits_section}\n\n"
            "---\n\n"
            "### Thank you!\n\n"
            f"{contributors}\n"
          )
          with open("RELEASE_NOTES.md", "w") as f:
            f.write(body)
          PYEOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
