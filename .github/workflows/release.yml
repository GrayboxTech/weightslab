name: Release CI

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # в”Ђв”Ђ Routing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Detect whether the tagged commit lives on main (в†’ PyPI production release)
  # or anywhere else (в†’ TestPyPI pre-release).  All downstream jobs branch on
  # this output so only the correct path runs.
  detect-target:
    name: Detect release target
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      is_main: ${{ steps.check.outputs.is_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether the tag commit is on main
        id: check
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF}")"
          IS_ON_MAIN=$(git merge-base --is-ancestor "${TAG_COMMIT}" origin/main \
                       && echo "true" || echo "false")
          echo "is_main=${IS_ON_MAIN}" >> $GITHUB_OUTPUT
          echo "Tag: ${GITHUB_REF_NAME}  commit: ${TAG_COMMIT}  on_main: ${IS_ON_MAIN}"

  # в”Ђв”Ђ Shared: run tests before main publish only в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  test:
    name: Run Tests Before Release
    needs: detect-target
    runs-on: ubuntu-latest
    if: ${{ needs.detect-target.outputs.is_main == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the test extra so pytest, graphviz, torchmetrics,
          # pytorch-lightning and tensorboard are available (several test modules
          # import pytest / use pytest fixtures and cannot run under bare unittest).
          python -m pip install .[utest] --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install pytest-timeout

      - name: Run tests
        run: |
          export WEIGHTSLAB_LOG_LEVEL="DEBUG"
          python -m pip install pytorch_lightning
          python -m unittest discover -s ./weightslab/tests -p "test_*.py" -t . -v

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # DEV RELEASE вЂ” tag on dev branch, not yet merged to main
  # Publishes to TestPyPI and creates a GitHub pre-release.
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  build-and-publish-dev-release:
    name: Build & Publish Dev Release (TestPyPI)
    needs: detect-target
    runs-on: ubuntu-latest
    if: ${{ needs.detect-target.outputs.is_main != 'true' }}
    permissions:
      contents: read
    outputs:
      published_version: ${{ steps.version.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Capture version from wheel
        id: version
        run: |
          WHEEL="$(ls dist/weightslab-*.whl | head -n 1)"
          if [ -z "${WHEEL}" ]; then echo "No wheel found"; exit 1; fi
          VERSION="$(basename "${WHEEL}" | sed -E 's/^weightslab-([^-]+)-.*/\1/')"
          echo "published_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Dev release version: ${VERSION}"

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "TEST_PYPI_API_TOKEN not set; skipping TestPyPI upload."
            exit 0
          fi
          python -m twine upload --repository-url https://test.pypi.org/legacy/ --verbose dist/*

      - name: Upload build artifacts for release
        uses: actions/upload-artifact@v6
        with:
          name: dev-release-dist
          path: dist/
          retention-days: 1

  # в”Ђв”Ђ Cross-version install test from TestPyPI (Dev Release) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  test-install-from-pip-dev-release:
    name: Test Install From TestPyPI вЂ” Python ${{ matrix.python-version }} (Dev Release)
    needs: build-and-publish-dev-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
          - python-version: '3.11'
          - python-version: '3.12'
          - python-version: '3.13'
          - python-version: '3.14'
            allow-prereleases: true
    continue-on-error: ${{ matrix.allow-prereleases == true }}
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases || false }}

      - name: Create isolated virtual environment
        run: python -m venv .venv-ci

      - name: Install from TestPyPI (wait until indexed)
        env:
          WL_VERSION: ${{ needs.build-and-publish-dev-release.outputs.published_version }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published_version from upstream job"; exit 1
          fi

          for attempt in $(seq 1 60); do
            echo "Checking TestPyPI for weightslab==${WL_VERSION} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url https://test.pypi.org/simple/ \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION}"
              break
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on TestPyPI"; exit 1
            fi
            sleep 7
          done

          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "weightslab==${WL_VERSION}" --no-cache-dir --retries 10 --timeout 60
          echo "weightslab==${WL_VERSION} installed on Python ${{ matrix.python-version }}"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "
          import weightslab, importlib.metadata as m
          print('weightslab import OK on Python ${{ matrix.python-version }}')
          print('installed version:', m.version('weightslab'))
          "

  create-dev-release:
    name: Create GitHub Pre-Release
    needs: [build-and-publish-dev-release, test-install-from-pip-dev-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dev-release-dist
          path: dist/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export VERSION="${GITHUB_REF_NAME}"
          export VERSION_NO_V="${VERSION#v}"
          export PYPI_URL="https://test.pypi.org/project/weightslab/${VERSION_NO_V}/"

          # Walk the actual commit graph for the nearest ancestor tag, rather
          # than a lexicographic/semver sort across ALL tags. The old sort
          # could pick an unrelated tag from a diverging branch вЂ” e.g. a
          # "v1.3.0-dev0" tag cut on dev after "v1.3.0" was tagged on main
          # sorted ABOVE it, making every real PR since v1.3.0 look "older"
          # than that bogus previous-tag date and get silently filtered out
          # (this is why past releases showed "no pull requests found").
          PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RAW_DATE=$(git log -1 --format="%aI" "${PREV_TAG}" 2>/dev/null || true)
            # Normalize to UTC "Z" form so string comparison against GitHub's
            # mergedAt (also UTC "Z") is valid regardless of the committer's
            # local timezone offset.
            export PREV_TAG_DATE=$(date -u -d "${RAW_DATE:-2020-01-01}" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || echo "2020-01-01T00:00:00Z")
            export GIT_RANGE="${PREV_TAG}..HEAD"
          else
            export PREV_TAG_DATE="2020-01-01T00:00:00Z"
            export GIT_RANGE="HEAD"
          fi

          export COMMITS_RAW
          COMMITS_RAW=$(git log "${GIT_RANGE}" --no-merges --format="%h%x09%s" 2>/dev/null | head -25 || true)

          export GIT_AUTHORS
          GIT_AUTHORS=$(git log "${GIT_RANGE}" --format="%an" 2>/dev/null | sort -u | sed 's/^/- /' | head -30 || true)

          # NOTE: deliberately NOT requesting --json commits here. With
          # --limit 100 that expands into a GraphQL query requesting 100 PRs'
          # worth of commit nodes, which reliably exceeds GitHub's 500,000
          # node budget and makes `gh` print a plain-text GraphQL error
          # instead of JSON вЂ” json.loads() below then fails, prs_data
          # silently becomes [], and every release note says "no pull
          # requests found" regardless of the date filter. Commits are
          # fetched below, one lightweight call per PR, only for the small
          # number of PRs that actually match this release.
          export PRS_JSON
          PRS_JSON=$(gh pr list --state merged --base "dev" --limit 100 \
            --json number,title,mergedAt,url,author,body \
            2>/dev/null || echo "[]")

          python3 << 'PYEOF'
          import os, json, re, importlib.util, subprocess
          version     = os.environ["VERSION"]
          pypi_url    = os.environ["PYPI_URL"]
          prev_date   = os.environ.get("PREV_TAG_DATE", "2020-01-01")
          commits_raw = os.environ.get("COMMITS_RAW", "")
          git_authors = os.environ.get("GIT_AUTHORS", "")
          try:
            prs_data = json.loads(os.environ.get("PRS_JSON", "[]"))
          except Exception:
            prs_data = []

          _README_RE = re.compile(r'^update\s+readme(\.md)?\s*$', re.IGNORECASE)

          def _strip_pr_suffix(head):
            return re.sub(r'\s*\(#\d+\)\s*$', '', head).strip()

          def _collapse_readme(entries):
            """entries: list of (oid_or_None, head) tuples, in original order.
            Collapse every bare "Update README[.md]" commit into a single
            "Update README (n)" line at the position of its first occurrence вЂ”
            these are near-duplicate housekeeping commits with no release signal."""
            out, count, placeholder_idx = [], 0, None
            for oid, head in entries:
              if _README_RE.match(_strip_pr_suffix(head)):
                count += 1
                if placeholder_idx is None:
                  placeholder_idx = len(out)
                  out.append(None)
                continue
              out.append((oid, head))
            if placeholder_idx is not None:
              label = "Update README" if count == 1 else f"Update README ({count})"
              out[placeholder_idx] = (None, label)
            return out

          def _format_entries(entries, indent=""):
            return [f"{indent}- `{oid}` {head}" if oid else f"{indent}- {head}" for oid, head in entries]

          def _pr_entry(pr):
            desc = " ".join((pr.get("body") or "").split())  # collapse newlines/whitespace
            if not desc:
              desc = pr["title"]
            if len(desc) > 512:
              desc = desc[:509].rstrip() + "..."
            return f"- [PR #{pr['number']}]({pr['url']}): {desc}"

          def _fetch_pr_commits(number):
            # One lightweight call per matched PR (see the note above the
            # PRS_JSON fetch for why this isn't batched into the list query).
            try:
              out = subprocess.run(
                ["gh", "pr", "view", str(number), "--json", "commits"],
                capture_output=True, text=True, timeout=30,
              )
              if out.returncode != 0:
                return []
              return json.loads(out.stdout).get("commits") or []
            except Exception:
              return []

          filtered = [pr for pr in prs_data if pr.get("mergedAt", "") > prev_date]
          # "What's Changed precisely": list each merged PR's own developer commits,
          # NOT the squashed/merge/chore commits that land on the release branch
          # (those are redundant with the PR list above and not useful).
          _seen_commits = set()
          _commit_blocks = []
          for pr in filtered:
            raw_entries = []
            for c in _fetch_pr_commits(pr["number"]):
              oid = (c.get("oid") or "")[:7]
              head = (c.get("messageHeadline") or "").strip()
              if not head or head.startswith("Merge "):
                continue
              key = (oid, head)
              if key in _seen_commits:
                continue
              _seen_commits.add(key)
              raw_entries.append((oid, head))
            commit_lines = _format_entries(_collapse_readme(raw_entries), indent="  ")
            if commit_lines:
              _commit_blocks.append(
                f"**[#{pr['number']}]({pr['url']}) {pr['title']}**\n" + "\n".join(commit_lines)
              )
          # Fall back to the raw git log only when no PR commits are available.
          if _commit_blocks:
            commits_section = "\n\n".join(_commit_blocks)
          else:
            fallback_entries = []
            for line in commits_raw.splitlines():
              if "\t" not in line:
                continue
              oid, head = line.split("\t", 1)
              fallback_entries.append((oid, head))
            fallback_entries = _collapse_readme(fallback_entries)
            commits_section = "\n".join(_format_entries(fallback_entries)) if fallback_entries else "_(no commits found)_"
          if filtered:
            prs_lines = "\n".join(_pr_entry(pr) for pr in filtered)
            seen, clabels = set(), []
            for pr in filtered:
              login = pr.get("author", {}).get("login", "")
              if login and login not in seen:
                seen.add(login)
                clabels.append(f"- [{login}](https://github.com/{login})")
            contributors = "\n".join(sorted(clabels))
          else:
            prs_lines = "_(no pull requests found since last release)_"
            contributors = git_authors or "_(no contributors found)_"

          # CLI banner (weightslab/art.py), loaded as a standalone file so we
          # don't pull in the full package (and its heavy optional deps) just
          # to print a logo. ANSI color codes are stripped (Markdown can't render
          # them); the box-drawing/ASCII art itself renders fine in a code fence.
          banner_block = ""
          try:
            spec = importlib.util.spec_from_file_location("wl_art", "weightslab/art.py")
            wl_art = importlib.util.module_from_spec(spec)
            spec.loader.exec_module(wl_art)
            plain_banner = re.sub(r'\x1b\[[0-9;]*m', '', wl_art._BANNER)
            banner_block = f"```text\n{plain_banner.strip(chr(10))}\n```\n\n"
          except Exception:
            pass

          body = (
            banner_block +
            "## **Weightslab**\n\n"
            "Follow us on [LinkedIn](https://www.linkedin.com/company/graybx-com/)"
            " | [Graybx](https://www.graybx.com/)\n\n"
            "---\n\n"
            "### Welcome\n\n"
            f"Welcome to the **{version}** release of WeightsLab. "
            "This release was made with the idea to improve how you "
            "Inspect Data, Edit and Evolve Neural Networks, all by Graybx:\n\n"
            f"{prs_lines}\n\n"
            "One platform. Unmatched flexibility. Ultimate control.  \n"
            f"Make sure to install our last version on [TestPyPI]({pypi_url})\n\n"
            "Happy Training!\n\n"
            "---\n\n"
            "### What's Changed precisely:\n\n"
            f"{commits_section}\n\n"
            "---\n\n"
            "### Thank you!\n\n"
            f"{contributors}\n"
          )
          with open("RELEASE_NOTES.md", "w", encoding="utf-8") as f:
            f.write(body)
          PYEOF

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dev Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # MAIN RELEASE вЂ” tag on main branch
  # Publishes to production PyPI and creates a GitHub full release.
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  build-and-publish-main:
    name: Build & Publish Main (PyPI)
    needs: [detect-target,test]
    # needs: [detect-target]
    runs-on: ubuntu-latest
    if: ${{ needs.detect-target.outputs.is_main == 'true' }}
    permissions:
      contents: read
    outputs:
      published_version: ${{ steps.version.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Capture version from wheel
        id: version
        run: |
          WHEEL="$(ls dist/weightslab-*.whl | head -n 1)"
          if [ -z "${WHEEL}" ]; then echo "No wheel found"; exit 1; fi
          VERSION="$(basename "${WHEEL}" | sed -E 's/^weightslab-([^-]+)-.*/\1/')"
          echo "published_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Main release version: ${VERSION}"

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "PYPI_API_TOKEN not set; skipping PyPI upload."
            exit 0
          fi
          python -m twine upload dist/* --non-interactive --verbose

      - name: Upload build artifacts for release
        uses: actions/upload-artifact@v6
        with:
          name: main-release-dist
          path: dist/
          retention-days: 1

  # в”Ђв”Ђ Cross-version install test from PyPI (Main Release) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  test-install-from-pip-main:
    name: Test Install From PyPI вЂ” Python ${{ matrix.python-version }} (Main Release)
    needs: build-and-publish-main
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create isolated virtual environment
        run: python -m venv .venv-ci

      - name: Install from PyPI (wait until indexed)
        env:
          WL_VERSION: ${{ needs.build-and-publish-main.outputs.published_version }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published_version from upstream job"; exit 1
          fi

          for attempt in $(seq 1 60); do
            echo "Checking PyPI for weightslab==${WL_VERSION} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url https://pypi.org/simple/ \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION}"
              break
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on PyPI"; exit 1
            fi
            sleep 7
          done

          python -m pip install \
            --index-url https://pypi.org/simple/ \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "weightslab==${WL_VERSION}" --no-cache-dir --retries 10 --timeout 60
          echo "weightslab==${WL_VERSION} installed on Python ${{ matrix.python-version }}"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "
          import weightslab, importlib.metadata as m
          print('weightslab import OK on Python ${{ matrix.python-version }}')
          print('installed version:', m.version('weightslab'))
          "

  create-main-release:
    name: Create GitHub Release
    needs: [build-and-publish-main, test-install-from-pip-main]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: main-release-dist
          path: dist/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export VERSION="${GITHUB_REF_NAME}"
          export VERSION_NO_V="${VERSION#v}"
          export PYPI_URL="https://pypi.org/project/weightslab/${VERSION_NO_V}/"

          # Walk the actual commit graph for the nearest ancestor tag, rather
          # than a lexicographic/semver sort across ALL tags. The old sort
          # could pick an unrelated tag from a diverging branch вЂ” e.g. a
          # "v1.3.0-dev0" tag cut on dev after "v1.3.0" was tagged on main
          # sorted ABOVE it, making every real PR since v1.3.0 look "older"
          # than that bogus previous-tag date and get silently filtered out
          # (this is why past releases showed "no pull requests found").
          PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RAW_DATE=$(git log -1 --format="%aI" "${PREV_TAG}" 2>/dev/null || true)
            # Normalize to UTC "Z" form so string comparison against GitHub's
            # mergedAt (also UTC "Z") is valid regardless of the committer's
            # local timezone offset.
            export PREV_TAG_DATE=$(date -u -d "${RAW_DATE:-2020-01-01}" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || echo "2020-01-01T00:00:00Z")
            export GIT_RANGE="${PREV_TAG}..HEAD"
          else
            export PREV_TAG_DATE="2020-01-01T00:00:00Z"
            export GIT_RANGE="HEAD"
          fi

          export COMMITS_RAW
          COMMITS_RAW=$(git log "${GIT_RANGE}" --no-merges --format="%h%x09%s" 2>/dev/null | head -25 || true)

          export GIT_AUTHORS
          GIT_AUTHORS=$(git log "${GIT_RANGE}" --format="%an" 2>/dev/null | sort -u | sed 's/^/- /' | head -30 || true)

          # NOTE: deliberately NOT requesting --json commits here. With
          # --limit 100 that expands into a GraphQL query requesting 100 PRs'
          # worth of commit nodes, which reliably exceeds GitHub's 500,000
          # node budget and makes `gh` print a plain-text GraphQL error
          # instead of JSON вЂ” json.loads() below then fails, prs_data
          # silently becomes [], and every release note says "no pull
          # requests found" regardless of the date filter. Commits are
          # fetched below, one lightweight call per PR, only for the small
          # number of PRs that actually match this release.
          export PRS_JSON
          PRS_JSON=$(gh pr list --state merged --base "main" --limit 100 \
            --json number,title,mergedAt,url,author,body \
            2>/dev/null || echo "[]")

          python3 << 'PYEOF'
          import os, json, re, importlib.util, subprocess
          version     = os.environ["VERSION"]
          pypi_url    = os.environ["PYPI_URL"]
          prev_date   = os.environ.get("PREV_TAG_DATE", "2020-01-01")
          commits_raw = os.environ.get("COMMITS_RAW", "")
          git_authors = os.environ.get("GIT_AUTHORS", "")
          try:
            prs_data = json.loads(os.environ.get("PRS_JSON", "[]"))
          except Exception:
            prs_data = []

          _README_RE = re.compile(r'^update\s+readme(\.md)?\s*$', re.IGNORECASE)

          def _strip_pr_suffix(head):
            return re.sub(r'\s*\(#\d+\)\s*$', '', head).strip()

          def _collapse_readme(entries):
            """entries: list of (oid_or_None, head) tuples, in original order.
            Collapse every bare "Update README[.md]" commit into a single
            "Update README (n)" line at the position of its first occurrence вЂ”
            these are near-duplicate housekeeping commits with no release signal."""
            out, count, placeholder_idx = [], 0, None
            for oid, head in entries:
              if _README_RE.match(_strip_pr_suffix(head)):
                count += 1
                if placeholder_idx is None:
                  placeholder_idx = len(out)
                  out.append(None)
                continue
              out.append((oid, head))
            if placeholder_idx is not None:
              label = "Update README" if count == 1 else f"Update README ({count})"
              out[placeholder_idx] = (None, label)
            return out

          def _format_entries(entries, indent=""):
            return [f"{indent}- `{oid}` {head}" if oid else f"{indent}- {head}" for oid, head in entries]

          def _pr_entry(pr):
            desc = " ".join((pr.get("body") or "").split())  # collapse newlines/whitespace
            if not desc:
              desc = pr["title"]
            if len(desc) > 512:
              desc = desc[:509].rstrip() + "..."
            return f"- [PR #{pr['number']}]({pr['url']}): {desc}"

          def _fetch_pr_commits(number):
            # One lightweight call per matched PR (see the note above the
            # PRS_JSON fetch for why this isn't batched into the list query).
            try:
              out = subprocess.run(
                ["gh", "pr", "view", str(number), "--json", "commits"],
                capture_output=True, text=True, timeout=30,
              )
              if out.returncode != 0:
                return []
              return json.loads(out.stdout).get("commits") or []
            except Exception:
              return []

          filtered = [pr for pr in prs_data if pr.get("mergedAt", "") > prev_date]
          # "What's Changed precisely": list each merged PR's own developer commits,
          # NOT the squashed/merge/chore commits that land on the release branch
          # (those are redundant with the PR list above and not useful).
          _seen_commits = set()
          _commit_blocks = []
          for pr in filtered:
            raw_entries = []
            for c in _fetch_pr_commits(pr["number"]):
              oid = (c.get("oid") or "")[:7]
              head = (c.get("messageHeadline") or "").strip()
              if not head or head.startswith("Merge "):
                continue
              key = (oid, head)
              if key in _seen_commits:
                continue
              _seen_commits.add(key)
              raw_entries.append((oid, head))
            commit_lines = _format_entries(_collapse_readme(raw_entries), indent="  ")
            if commit_lines:
              _commit_blocks.append(
                f"**[#{pr['number']}]({pr['url']}) {pr['title']}**\n" + "\n".join(commit_lines)
              )
          # Fall back to the raw git log only when no PR commits are available.
          if _commit_blocks:
            commits_section = "\n\n".join(_commit_blocks)
          else:
            fallback_entries = []
            for line in commits_raw.splitlines():
              if "\t" not in line:
                continue
              oid, head = line.split("\t", 1)
              fallback_entries.append((oid, head))
            fallback_entries = _collapse_readme(fallback_entries)
            commits_section = "\n".join(_format_entries(fallback_entries)) if fallback_entries else "_(no commits found)_"
          if filtered:
            prs_lines = "\n".join(_pr_entry(pr) for pr in filtered)
            seen, clabels = set(), []
            for pr in filtered:
              login = pr.get("author", {}).get("login", "")
              if login and login not in seen:
                seen.add(login)
                clabels.append(f"- [{login}](https://github.com/{login})")
            contributors = "\n".join(sorted(clabels))
          else:
            prs_lines = "_(no pull requests found since last release)_"
            contributors = git_authors or "_(no contributors found)_"

          # CLI banner (weightslab/art.py), loaded as a standalone file so we
          # don't pull in the full package (and its heavy optional deps) just
          # to print a logo. ANSI color codes are stripped (Markdown can't render
          # them); the box-drawing/ASCII art itself renders fine in a code fence.
          banner_block = ""
          try:
            spec = importlib.util.spec_from_file_location("wl_art", "weightslab/art.py")
            wl_art = importlib.util.module_from_spec(spec)
            spec.loader.exec_module(wl_art)
            plain_banner = re.sub(r'\x1b\[[0-9;]*m', '', wl_art._BANNER)
            banner_block = f"```text\n{plain_banner.strip(chr(10))}\n```\n\n"
          except Exception:
            pass

          body = (
            banner_block +
            "## **Weightslab**\n\n"
            "Follow us on [LinkedIn](https://www.linkedin.com/company/graybx-com/)"
            " | [Graybx](https://www.graybx.com/)\n\n"
            "---\n\n"
            "### Welcome\n\n"
            f"Welcome to the **{version}** release of WeightsLab. "
            "This release was made with the idea to improve how you "
            "Inspect Data, Edit and Evolve Neural Networks, all by Graybx:\n\n"
            f"{prs_lines}\n\n"
            "One platform. Unmatched flexibility. Ultimate control.  \n"
            f"Make sure to install our last version on [PyPI]({pypi_url})\n\n"
            "Happy Training!\n\n"
            "---\n\n"
            "### What's Changed precisely:\n\n"
            f"{commits_section}\n\n"
            "---\n\n"
            "### Thank you!\n\n"
            f"{contributors}\n"
          )
          with open("RELEASE_NOTES.md", "w", encoding="utf-8") as f:
            f.write(body)
          PYEOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
