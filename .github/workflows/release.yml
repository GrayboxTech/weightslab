name: Release CI

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-and-publish-main:
    name: Build & Publish Main (PyPI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      published_version: ${{ steps.main-version.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Tag ${GITHUB_REF} does not point to a commit on main"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Capture built version
        id: main-version
        run: |
          WHEEL_PATH="$(ls dist/weightslab-*.whl | head -n 1)"
          if [ -z "${WHEEL_PATH}" ]; then
            echo "No wheel found in dist/"
            exit 1
          fi
          WHEEL_FILE="$(basename "${WHEEL_PATH}")"
          WL_VERSION="$(echo "${WHEEL_FILE}" | sed -E 's/^weightslab-([^-]+)-.*/\1/')"
          if [ -z "${WL_VERSION}" ]; then
            echo "Could not parse version from ${WHEEL_FILE}"
            exit 1
          fi
          echo "published_version=${WL_VERSION}" >> $GITHUB_OUTPUT
          echo "Main published version: ${WL_VERSION}"

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "PYPI_API_TOKEN not set; skipping PyPI upload."
            exit 0
          fi
          python -m twine upload dist/* --non-interactive --verbose

  test-install-from-pip-main:
    name: Test Install From Pip Main
    needs: build-and-publish-main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create isolated virtual environment
        run: |
          python -m venv .venv-ci

      - name: Install from PyPI (with retry)
        env:
          WL_VERSION: ${{ needs.build-and-publish-main.outputs.published_version }}
        run: |
          . .venv-ci/bin/activate
          python -m pip install --upgrade pip
          if [ -z "${WL_VERSION}" ]; then
            echo "Missing published version from upstream job"
            exit 1
          fi

          # PyPI can take a few minutes to expose newly uploaded versions.
          for attempt in $(seq 1 60); do
            echo "Checking pip visibility for weightslab==${WL_VERSION} (attempt ${attempt}/60)"
            if python -m pip download \
                --index-url https://pypi.org/simple/ \
                --no-deps \
                "weightslab==${WL_VERSION}" \
                -d /tmp/wl-probe >/dev/null 2>&1; then
              echo "Found weightslab==${WL_VERSION} in PyPI simple index"
              break
            fi

            if [ "${attempt}" -eq 60 ]; then
              echo "Timed out waiting for weightslab==${WL_VERSION} on PyPI simple index"
              exit 1
            fi
            sleep 7
          done

          python -m pip install --index-url https://pypi.org/simple --extra-index-url https://download.pytorch.org/whl/cpu "weightslab==${WL_VERSION}" --no-cache-dir
          echo "weightslab==${WL_VERSION} installed from PyPI"

      - name: Verify package import
        run: |
          . .venv-ci/bin/activate
          python -c "import weightslab; import importlib.metadata as m; print('weightslab import OK'); print('installed version:', m.version('weightslab'))"

  create_release:
    runs-on: ubuntu-latest
    needs: test-install-from-pip-main
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: "dist/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
