name: Docs (GitHub Pages)

on:
  push:
    branches: [docstring, dev, main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute docs metadata
        id: meta
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            DOCS_PATH="tags/${REF_NAME}"
          else
            DOCS_PATH="branches/${REF_NAME}"
          fi
          echo "docs_path=${DOCS_PATH}" >> "$GITHUB_OUTPUT"
          echo "docs_version=${REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          python -m pip install numpy pandas tqdm PyYAML

      - name: Build Sphinx documentation
        env:
          DOCS_VERSION: ${{ steps.meta.outputs.docs_version }}
          DOCS_REF: ${{ github.ref_name }}
        run: sphinx-build -b html docs docs/_build/html

      - name: Prepare publish tree
        env:
          DOCS_PATH: ${{ steps.meta.outputs.docs_path }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          mkdir -p "site/${DOCS_PATH}"
          cp -a docs/_build/html/. "site/${DOCS_PATH}/"

          if [ "${REF_TYPE}" = "branch" ] && [ "${REF_NAME}" = "main" ]; then
            mkdir -p site/latest
            cp -a docs/_build/html/. site/latest/
          fi

          if [ "${REF_TYPE}" = "branch" ] && [ "${REF_NAME}" = "dev" ]; then
            mkdir -p site/dev
            cp -a docs/_build/html/. site/dev/
          fi

          touch site/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true
