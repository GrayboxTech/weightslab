name: Docs (GitHub Pages)

on:
  push:
    branches: [docstring, dev, main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          python -m pip install numpy pandas tqdm PyYAML

      - name: Compute docs version
        id: docs-version
        shell: bash
        run: |
          DOCS_REF="${GITHUB_REF_NAME}"
          DOCS_VERSION="${DOCS_REF}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            DOCS_VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "docs_ref=${DOCS_REF}" >> "$GITHUB_OUTPUT"
          echo "docs_version=${DOCS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Docs ref: ${DOCS_REF}"
          echo "Docs version: ${DOCS_VERSION}"

      - name: Build Sphinx documentation
        env:
          DOCS_REF: ${{ steps.docs-version.outputs.docs_ref }}
          DOCS_VERSION: ${{ steps.docs-version.outputs.docs_version }}
        run: sphinx-build -b html docs docs/_build/html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
